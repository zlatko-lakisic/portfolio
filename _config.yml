title: Zlatko Lakisic
description: Senior Solutions Architect · Engineering Leadership & Technical Strategy
url: https://zlatko-lakisic.github.io
baseurl: /zlatko-lakisic
theme: jekyll-theme-minimal

markdown: kramdown
kramdown:
  input: GFM

plugins:
  - jekyll-relative-links
  - jekyll-readme-index
  - jekyll-seo-tag

relative_links:
  enabled: true
  collections: true

readme_index:
  remove_originals: false

show_downloads: false

github_username: zlatko-lakisic

defaults:
  - scope:
      path: ""
    values:
      layout: default

exclude:
  - Gemfile
  - Gemfile.lock
  - portfolio.code-workspace
  - README.profile.md
